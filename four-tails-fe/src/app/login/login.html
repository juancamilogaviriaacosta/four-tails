<div class="login-page">

    <div class="login-card">
        <button class="close-btn" (click)="closeLogin()">
            ✕
        </button>

        <div class="login-header">
            <div class="logo">🐾</div>
            <h2>Sign in</h2>
            <p>Access your account or continue with a social provider</p>
        </div>

        <form class="login-form">

            <div class="form-group">
                <label>Username</label>
                <input type="text" placeholder="Email or username">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="********">
            </div>

            <button type="submit" class="btn-login">
                Sign in
            </button>

        </form>

        <div class="divider">
            <span>or continue with</span>
        </div>

        <div class="social-login">

            <button class="social-btn">
                <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg"
                     alt="Google">
                Google
            </button>

            <button class="social-btn">
                <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png"
                     alt="Facebook">
                Facebook
            </button>

            <button class="social-btn">
                <img src="https://cdn-icons-png.flaticon.com/512/0/747.png"
                     alt="Apple">
                Apple
            </button>

        </div>

    </div>

</div>
